  <h1 id="main-title">Contact Us</h1>

  <p class="text-muted">
    Fill this out. <span id="highlight">All fields required.</span>
  </p>

  <div class="card" style="padding: 12px;"> 
    <form>
      <label for="name">Name:</label>
      <input id="name" type="text" class="form-control" required>

      <label for="email">Email:</label>
      <input id="email" type="email" class="form-control" required>

      <label>Do you accept all terms?</label>
      <input type="radio" name="terms" required> Yes
      <input type="radio" name="terms"> No

      <br><br>

      <input type="submit" value="Submit" class="btn btn-primary" style="border-radius: 20px;"> 
    </form>
  </div>
